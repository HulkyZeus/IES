name: CI-CD Local Deployment

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  issues: write

concurrency:
  group: local-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-qa:
    name: Build + Test + QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compilar
        run: mvn -B clean compile

      - name: Ejecutar pruebas
        run: mvn -B test

      - name: QA
        run: mvn -B verify

      - name: Empaquetar aplicación
        run: mvn -B package -DskipTests

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar
          path: target/*.jar

  create-failure-issue:
    name: Crear issue si falla
    needs: build-test-qa
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Crear issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `CI falló: ${context.workflow} #${context.runNumber}`;
            const body = `
            El pipeline falló.

            - Workflow: ${context.workflow}
            - Run: #${context.runNumber}
            - Branch: ${context.ref}
            - Commit: ${context.sha}
            - Actor: ${context.actor}

            Revisar:
            https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            ### Tareas
            - [ ] Revisar compilación
            - [ ] Revisar pruebas
            - [ ] Revisar QA
            - [ ] Corregir errores
            - [ ] Ejecutar nuevamente el pipeline
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure', 'bug']
            });

  deploy-local:
    name: Deploy local
    needs: build-test-qa
    if: success() && github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compilar jar final
        run: mvn -B clean package -DskipTests

      - name: Crear directorio de despliegue
        run: mkdir -p /home/usco/apps/calculator

      - name: Detener aplicación anterior
        run: pkill -f 'calculator.*\.jar' || true

      - name: Copiar jar
        run: cp target/*.jar /home/usco/apps/calculator/calculator.jar

      - name: Levantar aplicación
        run: |
          nohup java -jar /home/usco/apps/calculator/calculator.jar \
            > /home/usco/apps/calculator/app.log 2>&1 &

      - name: Verificar proceso
        run: ps aux | grep calculator.jar | grep -v grep
